name: Daily Database Backup

on:
  schedule:
    - cron: '0 2 * * *'  # كل يوم الساعة 2 صباحاً UTC
  workflow_dispatch:       # تشغيل يدوي عند الحاجة

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get install -y curl ca-certificates
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          echo "deb https://apt.postgresql.org/pub/repos/apt noble-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          FILENAME="backup-$(date +%Y-%m-%d).sql"
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" > "$FILENAME"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: ${{ env.FILENAME }}
          retention-days: 90
